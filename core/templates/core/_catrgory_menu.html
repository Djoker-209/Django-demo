<div class="card">
  <div class="card-header fw-bold">📁 Categories</div>
  <ul class="list-group list-group-flush">
    <li class="list-group-item">
      <a href="{% url 'article_list' %}" class="text-decoration-none">All Articles</a>
    </li>
    {% for cat in categories %}
      <li class="list-group-item {% if cat.slug == active_category %}active{% endif %}">
        <a href="{% url 'article_list' %}?category={{ cat.slug }}"
           class="text-decoration-none {% if cat.slug == active_category %}text-white{% endif %}">
          {{ cat.name }}
          <span class="badge bg-secondary float-end">{{ cat.articles.count }}</span>
        </a>
      </li>
    {% empty %}
      <li class="list-group-item text-muted">No categories yet.</li>
    {% endfor %}
  </ul>
</div>
