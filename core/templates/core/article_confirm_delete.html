{% extends "core/base.html" %}
{% block title %}Delete Article{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white">🗑️ Confirm Delete</div>
      <div class="card-body">
        <p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Yes, delete</button>
          <a href="{{ object.get_absolute_url }}" class="btn btn-link">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
